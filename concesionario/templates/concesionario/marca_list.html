{% extends 'base.html' %}

{% block title %}Lista de Marcas{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Lista de Marcas</h3>
            <a href="{% url 'marca_create' %}" class="btn btn-dark ml-auto">Crear Marca</a>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="thead-dark">
                    <tr>
                        <th scope="col">Nombre</th>
                        <th scope="col">País de Origen</th>
                        <th scope="col">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for marca in marcas %}
                    <tr>
                        <td>{{ marca.nombre }}</td>
                        <td>{{ marca.pais_origen }}</td>
                        <td>
                            <a href="{% url 'marca_update' marca.pk %}" class="btn btn-sm btn-warning">Editar</a>
                            <a href="{% url 'marca_delete' marca.pk %}" class="btn btn-sm btn-danger">Eliminar</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
